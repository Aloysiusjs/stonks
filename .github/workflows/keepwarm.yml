name: Keep Render warm
on:
  schedule:
    # 13:20 UTC = 9:20 EDT — 5 min before the open trigger
    - cron: '20 13 * * 1-5'
    # 19:50 UTC = 15:50 EDT — 5 min before the close trigger
    - cron: '50 19 * * 1-5'
  workflow_dispatch:        # lets you run it manually to test right now
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake service
        run: |
          curl -sS -m 90 -w '\nHTTP %{http_code}\n' \
            -L https://stronks.onrender.com/
