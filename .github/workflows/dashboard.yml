name: Stock dashboard triggers

# Runs the ENTIRE bot on the GitHub Actions runner: fetch (yfinance) → format →
# earnings analysis → Telegram send. Render is gone. Yahoo IP-blocks Render's
# egress but not GitHub's runners, so fetching here is what actually returns
# data instead of a dashboard full of N/A.
#
# IMPORTANT: GitHub Actions cron is UTC ONLY and does not observe DST.
# Times below are set for EDT (UTC-4, ~Mar-Nov).
# When the US returns to EST (UTC-5, ~Nov-Mar), add 1 hour to each UTC time:
#   open  warm 14:15  trigger 14:25
#   close warm 20:45  trigger 20:55
# run.py's own session_status() window check is the safety net either way.

on:
  schedule:
    # ---- EDT (summer) schedule ----
    # Warm-up 10 min before open trigger: 13:15 UTC = 09:15 EDT
    - cron: '15 13 * * 1-5'
    # Open trigger: 13:25 UTC = 09:25 EDT
    - cron: '25 13 * * 1-5'
    # Warm-up 10 min before close trigger: 19:45 UTC = 15:45 EDT
    - cron: '45 19 * * 1-5'
    # Close trigger: 19:55 UTC = 15:55 EDT
    - cron: '55 19 * * 1-5'
  workflow_dispatch:
    inputs:
      session:
        description: 'Manually fire a session'
        required: true
        default: 'open'
        type: choice
        options: [warm, open, close]
      force:
        description: 'Bypass the market-window gate (send now, for testing)'
        required: false
        default: false
        type: boolean

concurrency:
  group: dashboard-trigger
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Decide action from schedule
        id: pick
        env:
          EVENT: ${{ github.event_name }}
          CRON: ${{ github.event.schedule }}
          MANUAL: ${{ github.event.inputs.session }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=$MANUAL" >> "$GITHUB_OUTPUT"
          else
            case "$CRON" in
              '25 13 * * 1-5') echo "mode=open"  >> "$GITHUB_OUTPUT" ;;
              '55 19 * * 1-5') echo "mode=close" >> "$GITHUB_OUTPUT" ;;
              *)               echo "mode=warm"  >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard
        env:
          MODE: ${{ steps.pick.outputs.mode }}
          # Only set true by a manual dispatch with the 'force' box ticked;
          # empty for scheduled runs, so crons always respect the gate.
          FORCE: ${{ github.event.inputs.force }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TICKERS: ${{ secrets.TICKERS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Defaults to on; set repo variable ANALYSIS_ENABLED=0 to ship the base bot.
          ANALYSIS_ENABLED: ${{ vars.ANALYSIS_ENABLED || '1' }}
          # Optional overrides — set these as repo Variables only to change the
          # defaults baked into config.py. The '||' fallback matters: a bare
          # passthrough of an unset var sends "", and int("") would crash run.py.
          EXCHANGE_TZ: ${{ vars.EXCHANGE_TZ || 'America/New_York' }}
          SESSION_WINDOW_MIN: ${{ vars.SESSION_WINDOW_MIN || '20' }}
        # run.py exits 0 on a successful send or a legitimately-skipped session,
        # and non-zero only on a real send failure — so a failed run is a true alert.
        run: |
          FORCE_FLAG=""
          if [ "${FORCE}" = "true" ]; then FORCE_FLAG="--force"; fi
          python run.py --session "${MODE}" ${FORCE_FLAG}
